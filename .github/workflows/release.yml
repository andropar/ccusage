name: Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  build:
    runs-on: macos-14
    steps:
      - uses: actions/checkout@v4

      - name: Build
        run: ./build.sh

      - name: Zip app bundle
        run: zip -r ccusage.app.zip ccusage.app

      - name: Create release
        uses: softprops/action-gh-release@v2
        with:
          files: ccusage.app.zip
          generate_release_notes: true
